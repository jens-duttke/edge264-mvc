--- # MVC dependent-view frame_num gap (generated by tests/gen_gap_stream.py).
# A regression guard for the access-unit view-pairing fix. Every non-anchor
# dependent view is non-reference, so the dependent view's PrevRefFrameNum never
# advances past the anchor; the final access unit's reference dependent then
# carries a large frame_num gap, and the decoder infers gap-fill frames between
# the base and its dependent (8.2.5.2), pushing the dependent's FrameId several
# past base+1. The final AU also has the lowest non-zero POC, so under a paced
# consumer it is force-bumped while the DPB is full and its dependent is not yet
# queued - the exact window the old decode-order "base+1" pairing shortcut got
# wrong. Pairing the views by (FrameNum, POC) resolves it; without the fix the
# held, mispaired frames overflow the DPB and the decoder aborts (the harness
# runs this fixture forked, so that abort is reported as a clean FAIL). All
# macroblocks are residual-free DC/zero-MV, so every decoded sample is 128 for
# both views in every frame (see ground_truth.py) - knowable without a decoder.
- nal_ref_idc: 3
  nal_unit_type: 7
  profile_idc: 66
  constraint_set_flags: [0,0,0,0,0,0]
  level_idc: 3.0
  log2_max_frame_num: 8
  pic_order_cnt_type: 0
  log2_max_pic_order_cnt_lsb: 8
  max_num_ref_frames: 4
  gaps_in_frame_num_value_allowed_flag: 1
  pic_size_in_mbs: {width: 1, height: 1}
  frame_mbs_only_flag: 1
  direct_8x8_inference_flag: 0
- nal_ref_idc: 3
  nal_unit_type: 8
  pic_parameter_set_id: 0
  entropy_coding_mode_flag: 0
  bottom_field_pic_order_in_frame_present_flag: 0
