--- # Small-resolution MVC DPB-fill stall (1x1 MB, two views, 20 access units).
# A tiny picture infers a large reorder window, so the per-view fullness bump
# queues a base while its decoded dependent is still unbumped; pre-fix the
# decoder stalls at 0 frames, post-fix it delivers all 20 stereo pairs.
# Residual-free (every sample = 128 by spec).

- nal_ref_idc: 3
  nal_unit_type: 7
  profile_idc: 66
  constraint_set_flags: [0,0,0,0,0,0]
  level_idc: 1.0
  log2_max_frame_num: 6
  pic_order_cnt_type: 0
  log2_max_pic_order_cnt_lsb: 6
  max_num_ref_frames: 2
  gaps_in_frame_num_value_allowed_flag: 0
  pic_size_in_mbs: {width: 1, height: 1}
  frame_mbs_only_flag: 1
  direct_8x8_inference_flag: 0

- nal_ref_idc: 3
